name: Check Nix flake

on:
  push:
    branches:
      - main
    paths:
      - flake.nix
      - flake.lock
      - nix/**
      - Makefile
      - scripts/**
      - .github/workflows/nix.yml
  pull_request:
    branches:
      - main
    paths:
      - flake.nix
      - flake.lock
      - nix/**
      - Makefile
      - scripts/**
      - .github/workflows/nix.yml
  workflow_dispatch:

jobs:
  check:
    permissions:
      contents: read
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Run Nix checks
        run: make check
