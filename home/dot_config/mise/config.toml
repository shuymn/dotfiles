[settings]
minimum_release_age = "1d"
lockfile = true
lockfile_platforms = ["macos-arm64"]
disable_backends = ["asdf", "vfox"]
npm.package_manager = "bun"
pipx.uvx = true
sops.age_key_file = "~/.config/age/key.txt"

[tools]
node = "24.16.0"
go = "1.26.4"
python = "3.14.6"
terraform = "1.15.6"
bun = "1.3.14"
uv = "0.11.20"
actionlint = "1.7.12"
"github:suzuki-shunsuke/ghalint" = "1.5.6"
"github:suzuki-shunsuke/pinact" = "v4.1.0"
lefthook = "2.1.9"
"github:k1LoW/octocov" = "0.75.8"
"github:k1LoW/mo" = "1.5.6"
betterleaks = "v1.4.1"
"github:ast-grep/ast-grep" = "0.43.0"
"npm:@earendil-works/pi-coding-agent" = "0.79.1"
"npm:skills" = "1.5.11"
"pipx:tavily-cli" = "0.1.4"
"github:go-task/task" = "3.51.1"
"pipx:microsandbox" = "0.5.6"
claude = "2.1.173"
codex = "0.139.0"

"http:cursor-agent" = { version = "2026.06.04-5fd875e", url = "https://downloads.cursor.com/lab/{{ version }}/{{ os(macos='darwin') }}/{{ arch() }}/agent-cli-package.tar.gz", bin = "cursor-agent", strip_components = 1 }
