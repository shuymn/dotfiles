# Ghostty + tmux
# Keep the terminal emulator thin; tmux owns sessions, windows, panes, popups,
# copy-mode, and clipboard integration.

# Terminal capabilities
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB:hyperlinks"
set -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u

# Responsiveness
set -sg escape-time 10
set -g repeat-time 500

# History
set -g history-limit 100000

# Indexes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Interaction
set -g mouse on
setw -g mode-keys vi
set -g set-clipboard on

# Status bar
set -g status-position bottom
set -g status-interval 1
set -g status-justify left
set -g status-left-length 90
set -g status-right-length 90
set -g status-bg colour235
set -g status-fg colour250
set -g status-left '#[bg=colour238,fg=colour250]#{?window_zoomed_flag, FULL ,#{?client_prefix, PREFIX , #{session_name} }}#[default] '
set -g status-right '#[bg=colour238,fg=colour250] #P #[default]'
setw -g window-status-format ' #I:#W - #{b:pane_current_path} '
setw -g window-status-current-format '#[bg=colour13,bold,fg=colour235] #I:#W - #{b:pane_current_path} #[default]'

# Panes
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind 5 split-window -v -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; split-window -v -c "#{pane_current_path}" \; select-layout even-vertical \; set-window-option synchronize-panes on
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind z resize-pane -Z
bind -n DoubleClick1Pane resize-pane -Z

# Floating workflows
bind Y display-popup -E -w 80% -h 70% -d "#{pane_current_path}" /bin/zsh
bind y run-shell 'current_path="#{pane_current_path}"; session="popup-$(printf "%s" "$current_path" | /sbin/md5 -q | /usr/bin/cut -c1-8)"; tmux has-session -t "$session" 2>/dev/null || tmux new-session -d -s "$session" -c "$current_path" /bin/zsh; tmux display-popup -w 90% -h 90% -d "$current_path" -E "tmux attach-session -t $session"'
unbind D
bind d if-shell -F '#{m:popup-*,#{session_name}}' 'detach-client' 'display-message "Not in a popup session"'
bind b set-window-option synchronize-panes \; display-message "synchronize-panes #{?pane_synchronized,on,off}"

# Copy mode
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel
